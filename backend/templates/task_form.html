{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Task | NexusProjects{% endblock %}
{% block page_title %}{% if editing %}Edit Task{% else %}New Task{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" name="project_name" value="{{ record.project_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Assignee</label>
        <input type="text" name="assignee" value="{{ record.assignee|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="to_do" {% if record.status == 'to_do' %}selected{% endif %}>To Do</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="review" {% if record.status == 'review' %}selected{% endif %}>Review</option>
          <option value="done" {% if record.status == 'done' %}selected{% endif %}>Done</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select name="priority">
          <option value="low" {% if record.priority == 'low' %}selected{% endif %}>Low</option>
          <option value="medium" {% if record.priority == 'medium' %}selected{% endif %}>Medium</option>
          <option value="high" {% if record.priority == 'high' %}selected{% endif %}>High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" name="due_date" value="{{ record.due_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Estimated Hours</label>
        <input type="number" name="estimated_hours" value="{{ record.estimated_hours|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Task</button>
      <a href="/tasks/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
